name: legalizaciones_uscom
description: Legalización corporativa de gastos USCOM SAS
publish_to: none
version: 1.0.0+1
environment: { sdk: '>=3.3.0 <4.0.0' }
dependencies:
  flutter: { sdk: flutter }
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.1
dev_dependencies:
  flutter_test: { sdk: flutter }
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2
flutter:
  uses-material-design: true
  assets: [assets/branding/logo_uscom.png, assets/branding/app_icon.png, assets/branding/splash_logo.png]
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: '#0A4E9B'
  adaptive_icon_foreground: assets/branding/app_icon.png
  web: {generate: true, image_path: assets/branding/app_icon.png, background_color: '#0A4E9B', theme_color: '#0A4E9B'}
flutter_native_splash:
  color: '#FFFFFF'
  image: assets/branding/splash_logo.png
  android_12: {color: '#FFFFFF', image: assets/branding/splash_logo.png}
  web: true
